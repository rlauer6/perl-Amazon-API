project:
  description: "AWS API base class"
  author:
    name: Rob Lauer
    mailto: rlauer6@comcast.net
pm-module: Amazon::API
min-perl-version: 5.010
dependencies:
  test-requires: cpan/test-requires
  requires: cpan/requires
  recommends: cpan/recommends
path:
  pm-module: src/main/perl/lib
  tests: src/main/perl/t
  exe-files: src/main/bash/bin
  recurse: yes
extra-files:
  - ChangeLog
  - release-notes.md
  - share:
      - cpan/services.api
provides:
  - Amazon::API
  - Amazon::API::HTTP::Response
  - Amazon::API::HTTP::UserAgent
  - Amazon::API::Botocore
  - Amazon::API::Botocore::Pod
  - Amazon::API::Botocore::Shape
  - Amazon::API::Botocore::Services
  - Amazon::API::Botocore::Shape::Serializer
  - Amazon::API::Botocore::Shape::Utils
  - Amazon::API::Constants
  - Amazon::API::Error
  - Amazon::API::NullLogger
  - Amazon::API::Pod::Parser
  - Amazon::API::Pod::Simple::Text
  - Amazon::API::Signature4
  - Amazon::API::Template
resources:
  homepage: 'http://github.com/rlauer6/perl-Amazon-API'
  bugtracker:
    web: 'http://github.com/rlauer6/perl-Amazon-API/issues'
    mailto: rlauer6@comcast.net
  repository:
    url: 'git://github.com/rlauer6/perl-Amazon-API.git'
    web: 'http://github.com/rlauer6/perl-Amazon-API'
    type: 'git'
